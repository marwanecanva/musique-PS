<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identité sonore — Campagne municipale Paris 2026</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;padding:20px}
  h1{color:rgba(255,255,255,0.25);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-bottom:24px;text-align:center}
  .wrap{width:100%;max-width:420px}
  .slide{display:none;border-radius:24px;overflow:hidden;position:relative;width:100%;aspect-ratio:3/4;flex-direction:column}
  .slide.active{display:flex}
  .slide-bg-g{background:#0a1628}
  .slide-bg-d{background:#160a1a}
  .top{position:absolute;top:0;left:0;right:0;padding:28px 28px 0;z-index:10;text-align:center}
  .badge{display:inline-block;padding:5px 16px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
  .ttl{font-size:28px;font-weight:800;color:#fff;line-height:1.2}
  .canvas-wrap{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center}
  canvas{display:block}
  .bottom{position:absolute;bottom:0;left:0;right:0;padding:0 20px 24px;z-index:10}
  .genres{display:flex;flex-direction:column;gap:8px;margin-bottom:0}
  .genre-row{display:flex;align-items:center;gap:10px}
  .genre-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .genre-name{font-size:13px;color:#fff;width:115px;flex-shrink:0;font-weight:500}
  .genre-track{flex:1;background:rgba(255,255,255,0.1);border-radius:4px;height:6px;overflow:hidden}
  .genre-fill{height:6px;border-radius:4px}
  .genre-pct{font-size:12px;width:30px;text-align:right;flex-shrink:0}
  .nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:20px}
  .dot-nav{width:8px;height:8px;border-radius:50%;background:#ccc;opacity:0.3;cursor:pointer;transition:all .2s}
  .dot-nav.on{opacity:1;background:#fff;width:22px;border-radius:4px}
  .nbtn{background:none;border:1.5px solid rgba(255,255,255,0.25);color:#fff;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .2s}
  .nbtn:hover{background:rgba(255,255,255,0.1)}
  .credit{color:rgba(255,255,255,0.15);font-size:11px;margin-top:20px;text-align:center;letter-spacing:1px}
</style>
</head>
<body>

<h1>Campagne municipale Paris 2026</h1>

<div class="wrap">
  <div class="slide slide-bg-g active" id="s0">
    <div class="top">
      <span class="badge" style="background:rgba(79,195,247,0.15);color:#4fc3f7;border:1px solid rgba(79,195,247,0.3)">Emmanuel Grégoire</span>
      <div class="ttl">Identité<br>sonore</div>
    </div>
    <div class="canvas-wrap"><canvas id="cg"></canvas></div>
    <div class="bottom">
      <div class="genres">
        <div class="genre-row"><div class="genre-dot" style="background:#4fc3f7"></div><span class="genre-name">Rap / Urbain</span><div class="genre-track"><div class="genre-fill" style="width:30%;background:#4fc3f7"></div></div><span class="genre-pct" style="color:#4fc3f7">30%</span></div>
        <div class="genre-row"><div class="genre-dot" style="background:#f06292"></div><span class="genre-name">Indie / Rock</span><div class="genre-track"><div class="genre-fill" style="width:30%;background:#f06292"></div></div><span class="genre-pct" style="color:#f06292">30%</span></div>
        <div class="genre-row"><div class="genre-dot" style="background:#aed581"></div><span class="genre-name">Pop</span><div class="genre-track"><div class="genre-fill" style="width:20%;background:#aed581"></div></div><span class="genre-pct" style="color:#aed581">20%</span></div>
        <div class="genre-row"><div class="genre-dot" style="background:#ce93d8"></div><span class="genre-name">Classique</span><div class="genre-track"><div class="genre-fill" style="width:15%;background:#ce93d8"></div></div><span class="genre-pct" style="color:#ce93d8">15%</span></div>
        <div class="genre-row"><div class="genre-dot" style="background:#ffcc80"></div><span class="genre-name">Variété fr.</span><div class="genre-track"><div class="genre-fill" style="width:5%;background:#ffcc80"></div></div><span class="genre-pct" style="color:#ffcc80">5%</span></div>
      </div>
    </div>
  </div>

  <div class="slide slide-bg-d" id="s1">
    <div class="top">
      <span class="badge" style="background:rgba(206,147,216,0.15);color:#ce93d8;border:1px solid rgba(206,147,216,0.3)">Rachida Dati</span>
      <div class="ttl">Identité<br>sonore</div>
    </div>
    <div class="canvas-wrap"><canvas id="cd"></canvas></div>
    <div class="bottom">
      <div class="genres">
        <div class="genre-row"><div class="genre-dot" style="background:#ce93d8"></div><span class="genre-name">Electro / Ambiant</span><div class="genre-track"><div class="genre-fill" style="width:38%;background:#ce93d8"></div></div><span class="genre-pct" style="color:#ce93d8">38%</span></div>
        <div class="genre-row"><div class="genre-dot" style="background:#ef9a9a"></div><span class="genre-name">Pop</span><div class="genre-track"><div class="genre-fill" style="width:31%;background:#ef9a9a"></div></div><span class="genre-pct" style="color:#ef9a9a">31%</span></div>
        <div class="genre-row"><div class="genre-dot" style="background:#90caf9"></div><span class="genre-name">Cinématique</span><div class="genre-track"><div class="genre-fill" style="width:23%;background:#90caf9"></div></div><span class="genre-pct" style="color:#90caf9">23%</span></div>
        <div class="genre-row"><div class="genre-dot" style="background:#a5d6a7"></div><span class="genre-name">Indie Pop</span><div class="genre-track"><div class="genre-fill" style="width:15%;background:#a5d6a7"></div></div><span class="genre-pct" style="color:#a5d6a7">15%</span></div>
        <div class="genre-row"><div class="genre-dot" style="background:#ffcc80"></div><span class="genre-name">Variété fr.</span><div class="genre-track"><div class="genre-fill" style="width:8%;background:#ffcc80"></div></div><span class="genre-pct" style="color:#ffcc80">8%</span></div>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nbtn" onclick="go(-1)">&#8592;</button>
    <div id="dots" style="display:flex;gap:8px;align-items:center"></div>
    <button class="nbtn" onclick="go(1)">&#8594;</button>
  </div>
</div>

<p class="credit">Mémoire — Marwane Naji — Paris Nanterre 2025-2026</p>

<script>
const slides=document.querySelectorAll('.slide');
const dotsEl=document.getElementById('dots');
let cur=0;
slides.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot-nav'+(i===0?' on':'');
  d.onclick=()=>show(i);
  dotsEl.appendChild(d);
});
function show(n){
  slides[cur].classList.remove('active');
  dotsEl.children[cur].classList.remove('on');
  cur=(n+slides.length)%slides.length;
  slides[cur].classList.add('active');
  dotsEl.children[cur].classList.add('on');
}
function go(d){show(cur+d);}

function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}

function makeSphere(canvasId,genresDef){
  const canvas=document.getElementById(canvasId);
  const ctx=canvas.getContext('2d');
  let W,H,cx,cy,R,particles=[],rotX=0,rotY=0,velX=0.0004,velY=0.0008,t=0;

  function resize(){
    const rect=canvas.parentElement.getBoundingClientRect();
    W=canvas.width=rect.width*devicePixelRatio;
    H=canvas.height=rect.height*devicePixelRatio;
    cx=W/2;cy=H/2;R=Math.min(W,H)*0.26;build();
  }

  function build(){
    particles=[];
    genresDef.forEach((g,gi)=>{
      const n=Math.round(5000*g.w);
      const rgb=hexToRgb(g.c);
      const phi0=Math.acos(1-2*(gi+0.5)/genresDef.length);
      const theta0=gi*2.399963;
      for(let i=0;i<n;i++){
        const isCore=Math.random()<0.5;
        let phi,theta,r;
        if(isCore){const sp=0.25+Math.random()*0.2;phi=phi0+(Math.random()-.5)*sp;theta=theta0+(Math.random()-.5)*sp*1.1;r=R*(0.82+Math.random()*0.15);}
        else{phi=Math.acos(1-2*Math.random());theta=Math.random()*Math.PI*2;r=R*(0.65+Math.random()*0.32);}
        const x=r*Math.sin(phi)*Math.cos(theta),y=r*Math.sin(phi)*Math.sin(theta),z=r*Math.cos(phi);
        particles.push({ox:x,oy:y,oz:z,r:rgb.r,g:rgb.g,b:rgb.b,
          size:isCore?1.2+Math.random()*1.6:0.5+Math.random()*1.0,
          speed:0.2+Math.random()*0.8,phase:Math.random()*Math.PI*2,
          alpha:isCore?0.75+Math.random()*0.25:0.18+Math.random()*0.28});
      }
    });
  }

  setTimeout(resize,50);
  window.addEventListener('resize',resize);

  function frame(){
    requestAnimationFrame(frame);
    t+=0.012;velX*=0.99;velY*=0.99;velY+=0.0006;velX+=0.0002;rotX+=velX;rotY+=velY;
    ctx.clearRect(0,0,W,H);
    const cosX=Math.cos(rotX),sinX=Math.sin(rotX),cosY=Math.cos(rotY),sinY=Math.sin(rotY);
    const proj=particles.map(p=>{
      const pulse=1+0.03*Math.sin(t*p.speed+p.phase);
      const ox=p.ox*pulse,oy=p.oy*pulse,oz=p.oz*pulse;
      const y1=oy*cosX-oz*sinX,z1=oy*sinX+oz*cosX;
      const x2=ox*cosY+z1*sinY,z2=-ox*sinY+z1*cosY;
      const sc=(R*1.8)/(R*1.8+z2);
      return{sx:cx+x2*sc,sy:cy+y1*sc,z:z2,r:p.r,g:p.g,b:p.b,
        size:p.size*sc,alpha:p.alpha*(0.3+0.7*((z2+R)/(2*R)))};
    });
    proj.sort((a,b)=>a.z-b.z);
    proj.forEach(p=>{
      const a=Math.max(0.03,Math.min(1,p.alpha));
      ctx.beginPath();ctx.arc(p.sx,p.sy,Math.max(0.3,p.size),0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${a})`;ctx.fill();
    });
  }
  frame();
}

makeSphere('cg',[{c:'#4fc3f7',w:0.30},{c:'#f06292',w:0.30},{c:'#aed581',w:0.20},{c:'#ce93d8',w:0.15},{c:'#ffcc80',w:0.05}]);
makeSphere('cd',[{c:'#ce93d8',w:0.38},{c:'#ef9a9a',w:0.31},{c:'#90caf9',w:0.23},{c:'#a5d6a7',w:0.05},{c:'#ffcc80',w:0.03}]);
</script>
</body>
</html>
